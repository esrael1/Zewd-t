services:
    # Frontend
    web:
        image: jitsi/web:latest
        restart: ${RESTART_POLICY:-unless-stopped}
        ports:
            - '${HTTP_PORT:-8000}:80'
            - '${HTTPS_PORT:-8443}:443'
        volumes:
            - ${CONFIG_PATH:-.}/web:/config:Z
        environment:
            - PUBLIC_URL=${PUBLIC_URL}
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_BOSH_URL_BASE=http://prosody:5280
            - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - ETHERPAD_URL_BASE=${ETHERPAD_URL_BASE}
            - TZ
        networks:
            meet.jitsi:
                aliases:
                    - ${XMPP_DOMAIN}

    # XMPP server
    prosody:
        image: jitsi/prosody:latest
        restart: ${RESTART_POLICY:-unless-stopped}
        expose:
            - '5222'
            - '5347'
            - '5280'
        volumes:
            - ${CONFIG_PATH:-.}/prosody/config:/config:Z
            - ${CONFIG_PATH:-.}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
        environment:
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - XMPP_MODULES=${XMPP_MODULES}
            - XMPP_MUC_MODULES=${XMPP_MUC_MODULES}
            - XMPP_INTERNAL_MUC_MODULES=${XMPP_INTERNAL_MUC_MODULES}
            - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER}
            - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
            - JVB_AUTH_USER=${JVB_AUTH_USER}
            - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
            - JIGASI_XMPP_USER=${JIGASI_XMPP_USER}
            - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
            - JIBRI_XMPP_USER=${JIBRI_XMPP_USER}
            - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
            - JIBRI_RECORDER_USER=${JIBRI_RECORDER_USER}
            - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
            - JWT_APP_ID=${JWT_APP_ID}
            - JWT_APP_SECRET=${JWT_APP_SECRET}
            - JWT_ACCEPTED_ISSUERS=${JWT_ACCEPTED_ISSUERS:-zewd_app}
            - JWT_ACCEPTED_AUDIENCES=${JWT_ACCEPTED_AUDIENCES:-zewd_app}
            - JWT_ASAP_KEYSERVER=${JWT_ASAP_KEYSERVER}
            - JWT_ALLOW_EMPTY=${JWT_ALLOW_EMPTY}
            - JWT_AUTH_TYPE=${JWT_AUTH_TYPE}
            - ENABLE_AUTH=${ENABLE_AUTH}
            - AUTH_TYPE=${AUTH_TYPE}
            - LOG_LEVEL
            - TZ
        networks:
            meet.jitsi:
                aliases:
                    - ${XMPP_SERVER:-prosody}

    # Focus component
    jicofo:
        image: jitsi/jicofo:latest
        restart: ${RESTART_POLICY:-unless-stopped}
        volumes:
            - ${CONFIG_PATH:-.}/jicofo:/config:Z
        environment:
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - XMPP_SERVER=${XMPP_SERVER:-prosody}
            - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER}
            - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
            - JICOFO_RESERVATION_REST_BASE_URL=${JICOFO_RESERVATION_REST_BASE_URL}
            - JICOFO_ENABLE_HEALTH_CHECKS=${JICOFO_ENABLE_HEALTH_CHECKS}
            - JICOFO_CONF_INITIAL_PARTICIPANT_WAIT_TIMEOUT=${JICOFO_CONF_INITIAL_PARTICIPANT_WAIT_TIMEOUT}
            - JICOFO_ENABLE_AUTO_OWNER=${JICOFO_ENABLE_AUTO_OWNER}
            - JICOFO_WAIT_FOR_MODERATOR=${JICOFO_WAIT_FOR_MODERATOR}
            - LOG_LEVEL
            - TZ
        depends_on:
            - prosody
        networks:
            meet.jitsi:

                # Video bridge
    jvb:
        image: jitsi/jvb:latest
        restart: ${RESTART_POLICY:-unless-stopped}
        ports:
            - '${JVB_PORT:-10000}:10000/udp'
            - '${JVB_TCP_PORT:-4443}:4443'
        volumes:
            - ${CONFIG_PATH:-.}/jvb:/config:Z
        environment:
            - DOCKER_HOST_ADDRESS=${DOCKER_HOST_ADDRESS}
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - XMPP_SERVER=${XMPP_SERVER:-prosody}
            - JVB_AUTH_USER=${JVB_AUTH_USER}
            - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
            - JVB_BREWERY_MUC=${JVB_BREWERY_MUC}
            - JVB_PORT=${JVB_PORT:-10000}
            - JVB_TCP_HARVESTER_DISABLED=${JVB_TCP_HARVESTER_DISABLED}
            - JVB_TCP_PORT=${JVB_TCP_PORT:-4443}
            - JVB_STUN_SERVERS=${JVB_STUN_SERVERS}
            - JVB_ENABLE_HEALTH_CHECKS=${JVB_ENABLE_HEALTH_CHECKS}
            - PUBLIC_URL=${PUBLIC_URL}
            - LOG_LEVEL
            - TZ
        depends_on:
            - prosody
        networks:
            meet.jitsi:


networks:
    meet.jitsi:
