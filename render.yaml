services:
  - type: web
    name: zewd
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: ZEWD
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: zewd-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: zewd-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: zewd-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: zewd-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: zewd-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: JITSI_APP_ID
        sync: false
      - key: JITSI_KID
        sync: false
      - key: JITSI_ISS
        sync: false
      - key: JITSI_AUD
        sync: false
      - key: JITSI_SUB
        sync: false
      - key: JITSI_JWT_SECRET
        sync: false

databases:
  - name: zewd-db
    plan: free
